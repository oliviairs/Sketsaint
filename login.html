<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" style="text-decoration:none;"><img src="https://placehold.co/120x32/1a1a1a/ffffff?text=SKETSAINT&font=playfair-display" alt="Sketsaint" style="height:32px;"></a>
    <div class="navlinks">
      <a href="index.html#galeri">Galeri</a>
      <a href="index.html#katalog">Katalog</a>
      <a href="index.html#alur">Alur</a>
    </div>
    <a class="navcta" href="login.html">Masuk</a>
  </div>
</nav>

<div class="device-page">
  <div class="screen-label">Login / registrasi</div>
  <div class="device">
    <div class="device-bar"><span></span><span></span><span></span></div>
    <div class="device-body">
      <div class="login-box">
        <h3>Masuk ke akun</h3>
        <p class="login-sub">Pesan ilustrasi favoritmu</p>
        <label class="field-label">Email</label>
        <input class="field-input" type="text" id="input-email" placeholder="nama@email.com">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="input-password" placeholder="••••••••">
        <button class="full-btn" onclick="masuk()">Masuk</button>
        <p class="switch-text">Belum punya akun? <a href="registrasi.html" style="color:var(--terracotta-dark);text-decoration:none;font-weight:600;">Daftar</a></p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">Mockup sistem Digital Art Commission &copy; 2026 Olivia. All rights Reserved.</div>
</footer>

<script>
function masuk() {

    const email = document.getElementById("input-email").value.trim().toLowerCase();
    const password = document.getElementById("input-password").value;

    if (email === "artist") {
        window.location.href = "login-artist.html";
        return;
    }

    const emailTersimpan = localStorage.getItem("email");
    const passwordTersimpan = localStorage.getItem("password");

    if (email === emailTersimpan && password === passwordTersimpan) {
        window.location.href = "index2.html";
    } else {
        alert("Email atau password salah.");
    }

}
</script>

</body>
</html>
