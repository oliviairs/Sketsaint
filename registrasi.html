<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun — Sketsaint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" style="text-decoration:none;">
      <img src="https://placehold.co/120x32/1a1a1a/ffffff?text=SKETSAINT&font=playfair-display" alt="Sketsaint" style="height:32px;">
    </a>
    <div class="navlinks">
      <a href="index.html#galeri">Galeri</a>
      <a href="index.html#katalog">Katalog</a>
      <a href="index.html#alur">Alur</a>
    </div>
    <a class="navcta" href="login.html">Masuk</a>
  </div>
</nav>

<div class="device-page">
  <div class="screen-label">Registrasi akun</div>
  <div class="device">
    <div class="device-bar"><span></span><span></span><span></span></div>
    <div class="device-body">
      <div class="login-box">
        <h3>Buat akun baru</h3>
        <p class="login-sub">Daftar untuk mulai memesan ilustrasi</p>
        <label class="field-label">Nama Lengkap</label>
        <input class="field-input" type="text" id="nama" placeholder="Nama kamu">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="email" placeholder="nama@email.com">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="password" placeholder="Min. 8 karakter">
        <label class="field-label">Konfirmasi Password</label>
        <input class="field-input" type="password" id="konfirmasi" placeholder="Ulangi password">
        <button class="full-btn" onclick="daftar()">Daftar Sekarang</button>
        <p class="switch-text">Sudah punya akun? <a href="login.html" style="color:var(--terracotta-dark);text-decoration:none;font-weight:600;">Masuk</a></p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">Mockup sistem Digital Art Commission &copy; 2026 Olivia. Art by KANAU All rights Reserved.</div>
</footer>

<script>
function daftar(){

    const nama = document.getElementById("nama").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const konfirmasi = document.getElementById("konfirmasi").value;

    if(nama === "" || email === "" || password === "" || konfirmasi === ""){
        alert("Semua data harus diisi.");
        return;
    }

    if(password !== konfirmasi){
        alert("Konfirmasi password tidak sesuai.");
        return;
    }

    localStorage.setItem("nama", nama);
    localStorage.setItem("email", email);
    localStorage.setItem("password", password);

    alert("Registrasi berhasil!");

    window.location.href = "index2.html";

}
</script>

</body>
</html>
